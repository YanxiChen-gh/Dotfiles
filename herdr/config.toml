# herdr config - https://herdr.dev/docs/configuration/
[keys]
# Leader key; herdr's default is ctrl+b.
prefix = "ctrl+g"
previous_tab = "prefix+left"
next_tab = "prefix+right"

# New agent tabs use a fresh treehouse worktree. Native new_tab (prefix+c)
# still makes plain tabs.
[[keys.command]]
key = "prefix+a"
type = "shell"
description = "New agent tab (treehouse worktree: OpenCode)"
command = "$HOME/dotfiles/herdr/new-agent-tab.sh"

[[keys.command]]
key = "prefix+shift+a"
type = "shell"
description = "New agent tab (treehouse worktree: OpenCode + nvim)"
command = "$HOME/dotfiles/herdr/new-agent-tab.sh --with-editor"
