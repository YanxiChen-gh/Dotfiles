onboarding = false
# herdr config - https://herdr.dev/docs/configuration/
[keys]
# Leader key; herdr's default is ctrl+b.
prefix = "ctrl+g"
previous_tab = "prefix+left"
next_tab = "prefix+right"

# Choose whether a new development tab uses a treehouse worktree, OpenCode,
# and an nvim split. Native new_tab (prefix+c) still makes plain tabs.
[[keys.command]]
key = "prefix+a"
type = "pane"
description = "Choose new development tab setup"
command = "$HOME/dotfiles/herdr/new-agent-tab.sh --select"

[[keys.command]]
key = "prefix+shift+a"
type = "shell"
description = "New agent tab (treehouse worktree: OpenCode + nvim)"
command = "$HOME/dotfiles/herdr/new-agent-tab.sh --with-editor"
