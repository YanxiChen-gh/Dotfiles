# herdr config - https://herdr.dev/docs/configuration/
[keys]
# Leader key; herdr's default is ctrl+b.
prefix = "ctrl+g"
previous_tab = "prefix+left"
next_tab = "prefix+right"

# New agent tab: fresh treehouse worktree, split left/right into Claude Code
# (auto-accept) and nvim. Native new_tab (prefix+c) still makes plain tabs.
[[keys.command]]
key = "prefix+a"
type = "shell"
description = "New agent tab (treehouse worktree: Claude + nvim)"
command = "$HOME/dotfiles/herdr/new-agent-tab.sh"
